services:
  ordo:
    build:
      context: .
      dockerfile: Dockerfile
    image: studio-ordo/ordo:0.1.0
    env_file:
      - path: .env.local
        required: false
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:17760:17760"
    environment:
      ORDO_DB_PATH: /app/.data/local.db
      ORDO_DAEMON_URL: http://127.0.0.1:17760
      ORDO_DAEMON_TRUST_DOCKER_HOST: "1"
      NEXT_PUBLIC_ORDO_DAEMON_WS_URL: ws://127.0.0.1:17760/ws
      NEXT_PUBLIC_ORDO_DAEMON_CHAT_WS_URL: ws://127.0.0.1:17760/chat/ws
      ORDO_OLLAMA_BASE_URL: http://host.docker.internal:11434/api
      ORDO_OLLAMA_MODEL: qwen2.5-coder:7b
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ordo-data:/app/.data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "async function check(url){const response=await fetch(url);if(!response.ok)throw new Error(url+' '+response.status)}Promise.all([check('http://127.0.0.1:17760/ready'),check('http://127.0.0.1:3000/')]).catch((error)=>{console.error(error.message);process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  ordo-data:
